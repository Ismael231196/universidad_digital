[pytest]
minversion = 7.0
testpaths =
    tests
python_files = test_*.py
addopts =
    -ra
    --strict-markers
    --disable-warnings
    --cov=app
    --cov-report=term-missing
markers =
    unit: pruebas unitarias puras (sin IO)
    integration: pruebas de integración (BD, red interna)
    e2e: pruebas end-to-end de API
    security: pruebas de seguridad y permisos

