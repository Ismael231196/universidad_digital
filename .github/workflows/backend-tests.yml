name: Backend Tests & Quality

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12']
  
    env:
      APP_JWT_SECRET: "test-secret"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      working-directory: backend
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov ruff

    - name: Run Lint (Ruff)
      working-directory: backend
      run: ruff check app/ tests/
      continue-on-error: true

    - name: Run Unit Tests
      working-directory: backend
      run: |
        pytest -m unit -v --tb=short --cov=app --cov-report=xml --cov-report=term-missing
      continue-on-error: false

    - name: Run Integration Tests
      working-directory: backend
      run: |
        pytest -m integration -v --tb=short --cov=app --cov-report=xml --cov-append
      continue-on-error: false

    - name: Run Security Tests
      working-directory: backend
      run: |
        pytest -m security -v --tb=short --cov=app --cov-report=xml --cov-append
      continue-on-error: false

    - name: Check Coverage Threshold
      working-directory: backend
      run: |
        pytest --cov=app --cov-fail-under=85 --cov-report=term-missing
      continue-on-error: false

    - name: Upload Coverage Reports
      uses: codecov/codecov-action@v3
      with:
        files: ./backend/coverage.xml
        flags: backend
        name: backend-coverage
        fail_ci_if_error: false

    - name: Comment PR with Coverage
      if: github.event_name == 'pull_request'
      uses: py-cov-action/python-coverage-comment-action@v3
      with:
        GITHUB_TOKEN: ${{ github.token }}

    - name: Test Report
      if: always()
      working-directory: backend
      run: |
        echo "✅ Backend Tests Summary"
        echo "======================="
        pytest --collect-only -q | tail -5
