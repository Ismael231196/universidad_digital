name: Frontend Tests & Quality

on:
  push:
    branches: [main, develop]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-tests.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'frontend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}

    - name: Cache npm dependencies
      uses: actions/cache@v3
      with:
        path: ~/.npm
        key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          ${{ runner.os }}-node-

    - name: Install dependencies
      working-directory: frontend
      run: npm ci

    - name: Run Lint (ESLint)
      working-directory: frontend
      run: npm run lint 2>/dev/null || echo "⚠️ Lint warnings (non-blocking)"
      continue-on-error: true

    - name: Run Unit Tests
      working-directory: frontend
      run: npm run test:unit -- --coverage --reporter=verbose
      continue-on-error: false

    - name: Run Integration Tests
      working-directory: frontend
      run: npm run test:integration -- --coverage
      continue-on-error: true

    - name: Upload Coverage Reports
      uses: codecov/codecov-action@v3
      with:
        files: ./frontend/coverage/coverage-final.json
        flags: frontend
        name: frontend-coverage
        fail_ci_if_error: false

    - name: Test Report
      if: always()
      working-directory: frontend
      run: |
        echo "✅ Frontend Tests Summary"
        echo "========================="
        npm run test:unit -- --listTests 2>/dev/null | wc -l
